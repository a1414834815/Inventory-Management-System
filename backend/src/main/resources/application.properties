# Server
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=5s

# Lazy initialization - significantly faster startup
spring.main.lazy-initialization=true

# H2 Database (file-based, stored in ./data directory)
spring.datasource.url=jdbc:h2:file:./data/ims;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Optimization
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# Disable H2 Console (not needed in production)
spring.h2.console.enabled=false

# Disable JMX
spring.jmx.enabled=false

# File upload limits (for Excel import, max 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Asia/Shanghai
