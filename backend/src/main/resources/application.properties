# Server
server.port=8080

# H2 Database (file-based, stored in ./data directory)
spring.datasource.url=jdbc:h2:file:./data/ims;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for debugging, visit /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload limits (for Excel import, max 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Asia/Shanghai
